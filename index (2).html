  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ght:400}\n  .brand i{font-style:normal;color:#fff}\n  .sec-light .brand i,.sec-grey .brand i{color:#000}\n  .nav-links{display:flex;align-items:center;gap:38px}\n  .nav-links a.lnk{font-size:13px;font-weight:500;letter-spacing:.04em;color:var(--muted-dark);transition:color .3s}\n  .nav-links a.lnk:hover{color:#fff}\n  .nav-cta{font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:12px 22px;border:1px solid var(--line-dark);transition:background .35s var(--ease),color .35s var(--ease),border-color .35s}\n  .nav-cta:hover{background:var(--blue);border-color:var(--blue);color:#fff}\n  .burger{display:none;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:8px}\n  .burger span{width:26px;height:2px;background:#fff;transition:transform .35s var(--ease),opacity .25s}\n  .mobile-menu{position:fixed;inset:0;z-index:99;background:var(--black);display:flex;flex-direction:column;justify-content:center;gap:6px;padding:0 var(--pad);transform:translateY(-100%);transition:transform .55s var(--ease);visibility:hidden}\n  .mobile-menu.open{transform:translateY(0);visibility:visible}\n  .mobile-menu a{font-family:var(--display);font-size:clamp(34px,9vw,58px);text-transform:uppercase;color:#fff;padding:8px 0;border-bottom:1px solid var(--line-dark);transition:color .3s,padding-left .3s var(--ease)}\n  .mobile-menu a:hover{color:var(--blue);padding-left:14px}\n  .mobile-menu .mm-cta{margin-top:32px;font-family:var(--sans);font-size:15px;border:0;color:var(--muted-dark)}\n\n  /* ---------- hero ---------- */\n  .hero{position:relative;padding-top:140px;padding-bottom:64px;min-height:100vh;display:flex;align-items:center}\n  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(32px,5vw,72px);align-items:center;width:100%}\n  .hero-eyebrow{margin-bottom:30px;color:var(--muted-dark)}\n  .hero h1{margin:0 0 28px}\n  .hero h1 .line{display:block;overflow:hidden}\n  .hero h1 .line i{display:block;font-style:normal;trans roadmap from following to predictable revenue.<\u002Fp><\u002Fdiv>\n      <div class=\"svc reveal\" data-d=\"2\"><span class=\"bar\"><\u002Fspan><span class=\"num\">03<\u002Fspan><h3>Audience Growth<\u002Fh3><p>Grow the right audience — buyers, not vanity numbers.<\u002Fp><\u002Fdiv>\n      <div class=\"svc reveal\" data-d=\"3\"><span class=\"bar\"><\u002Fspan><span class=\"num\">04<\u002Fspan><h3>Email List Building<\u002Fh3><p>Own your distribution with a list no platform can take.<\u002Fp><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"bar\"><\u002Fspan><span class=\"num\">05<\u002Fspan><h3>Revenue Systems<\u002Fh3><p>Funnels and sales flows that convert while you create.<\u002Fp><\u002Fdiv>\n      <div class=\"svc reveal\" data-d=\"1\"><span class=\"bar\"><\u002Fspan><span class=\"num\">06<\u002Fspan><h3>Digital Products<\u002Fh3><p>Productise your knowledge into scalable assets.<\u002Fp><\u002Fdiv>\n      <div class=\"svc reveal\" data-d=\"2\"><span class=\"bar\"><\u002Fspan><span class=\"num\">07<\u002Fspan><h3>Memberships<\u002Fh3><p>Build recurring income with communities that retain.<\u002Fp><\u002Fdiv>\n      <div class=\"svc reveal\" data-d=\"3\"><span class=\"bar\"><\u002Fspan><span class=\"num\">08<\u002Fspan><h3>Business Infrastructure<\u002Fh3><p>The systems, tools and ops behind a real company.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ METHOD ============ -->\n<section class=\"sec-black pad-y\" id=\"method\">\n  <div class=\"wrap\">\n    <div class=\"sec-head on-dark reveal\">\n      <div class=\"kicker\">03 — The Process<\u002Fdiv>\n      <h2 class=\"display h-lg\" style=\"margin-top:24px\">The ScaleHaus Method<\u002Fh2>\n      <p class=\"lead on-dark\">A proven path from scattered content to a structured, scalable business.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"method\">\n      <div class=\"step reveal\">\n        <div class=\"s-num\">01<\u002Fdiv>\n        <div class=\"s-title\">Audit<\u002Fdiv>\n        <div class=\"s-desc\">We map your audience, assets and income today — and pinpoint exactly where the revenue is leaking out.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"s-num\">02<\u002Fdiv>\n        <div class=\"s-title\">Strategy<\u002Fdiv>\n        <div class=\"s-desc\">A bespoke monetisation plan: the offers, pricing and systems built around your audience and strengths.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"s-num\">03<\u002Fdiv>\n        <div class=\"s-title\">Build<\u002Fdiv>\n        <div class=\"s-desc\">We build it with you — offers, email list, funnels and the infrastructure that runs the business.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"s-num\">04<\u002Fdiv>\n        <div class=\"s-title\">Scale<\u002Fdiv>\n        <div class=\"s-desc\">Optimise, diversify and compound — turning one income stream into a durable, multi-stream company.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ REVENUE ============ -->\n<section class=\"sec-light pad-y\" id=\"revenue\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <div class=\"kicker\">04 — Revenue Architecture<\u002Fdiv>\n      <h2 class=\"display h-lg\" style=\"margin-top:24px\">The Best Creators Don't Rely On One Income Stream<\u002Fh2>\n      <p class=\"lead\">Tap each stream to build your stack. One channel is a risk — a portfolio is a business.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"rev-grid\">\n      <div class=\"rev-list reveal\" id=\"revList\">\n        <div class=\"rev-item on\" data-w=\"20\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Brand Deals<\u002Fspan><span class=\"rev-tag\">VOLATILE<\u002Fspan><\u002Fdiv>\n        <div class=\"rev-item\" data-w=\"18\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Digital Products<\u002Fspan><span class=\"rev-tag\">SCALABLE<\u002Fspan><\u002Fdiv>\n        <div class=\"rev-item\" data-w=\"16\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Memberships<\u002Fspan><span class=\"rev-tag\">RECURRING<\u002Fspan><\u002Fdiv>\n        <div class=\"rev-item\" data-w=\"12\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Affiliate Revenue<\u002Fspan><span class=\"rev-tag\">PASSIVE<\u002Fspan><\u002Fdiv>\n        <div class=\"rev-item\" data-w=\"14\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Services<\u002Fspan><span class=\"rev-tag\">HIGH-MARGIN<\u002Fspan><\u002Fdiv>\n        <div class=\"rev-item\" data-w=\"12\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Courses<\u002Fspan><span class=\"rev-tag\">LEVERAGED<\u002Fspan><\u002Fdiv>\n        <div class=\"rev-item\" data-w=\"8\"><span class=\"rev-check\"><svg viewBox=\"0 0 18 18\"><polyline points=\"3,9 7,13 15,4\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span class=\"rev-name\">Communities<\u002Fspan><span class=\"rev-tag\">COMPOUNDING<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rev-panel reveal\" data-d=\"1\">\n        <div>\n          <div class=\"rp-top\">\n            <span class=\"rp-label\">Your Revenue Stack<\u002Fspan>\n            <span class=\"rp-label\" id=\"revStreams\">1 / 7 streams<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"rev-count\"><em id=\"revNum\">1<\u002Fem><span style=\"fon <\u002Flabel>\n          <input id=\"lf-email\" name=\"email\" type=\"email\" autocomplete=\"email\" required=\"\" placeholder=\"you@email.com\">\n        <\u002Fdiv>\n        <div class=\"field-row\">\n          <div class=\"field\">\n            <label for=\"lf-platform\">Primary platform<\u002Flabel>\n            <select id=\"lf-platform\" name=\"platform\">\n              <option>Instagram<\u002Foption>\n              <option>YouTube<\u002Foption>\n              <option>TikTok<\u002Foption>\n              <option>X / Twitter<\u002Foption>\n              <option>LinkedIn<\u002Foption>\n              <option>Podcast<\u002Foption>\n              <option>Newsletter<\u002Foption>\n              <option>Other<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label for=\"lf-audience\">Audience size<\u002Flabel>\n            <select id=\"lf-audience\" name=\"audience\">\n              <option>Under 10k<\u002Foption>\n              <option>10k – 50k<\u002Foption>\n              <option>50k – 250k<\u002Foption>\n              <option>250k – 1M<\u002Foption>\n              <option>1M+<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label for=\"lf-goal\">What do you want to build? <span>(optional)<\u002Fspan><\u002Flabel>\n          <textarea id=\"lf-goal\" name=\"goal\" rows=\"3\" placeholder=\"e.g. launch a digital product, grow my email list, add recurring revenue…\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <input type=\"hidden\" name=\"_subject\" value=\"New ScaleHaus strategy call request\">\n        <input type=\"text\" name=\"_honey\" style=\"display:none\" tabindex=\"-1\" autocomplete=\"off\">\n        <button type=\"submit\" class=\"btn btn-primary modal-submit\" id=\"leadSubmit\"><span>Request My Call<\u002Fspan><span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n        <p class=\"form-error\" id=\"leadError\">Something went wrong. Please email us directly at hello@scale-haus.io.<\u002Fp>\n        <p class=\"form-note\">We'll reply within 24 hours to lock in your call. Your details stay private.<\u002Fp>\n      <\u002Fform>\n      <div class=\"lead-success\" id=\"leadSuccess\">\n        <div class=\"success-mark\">✓<\u002Fdiv>\n        <h3>Request Received<\u002Fh3>\n        <p>Thanks — we'll be in touch within 24 hours to lock in your strategy call. Keep an eye on your inbox.<\u002Fp>\n        <button class=\"btn btn-ghost\" id=\"successClose\"><span>Close<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ FOOTER ============ -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-top\">\n      <div class=\"foot-brand\">\n        <div class=\"brand\"><i>Scale<\u002Fi><b>Haus<\u002Fb><\u002Fdiv>\n        <p>Turning audiences into businesses. The growth partner for creators who want to own their revenue.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h4>Navigate<\u002Fh4>\n        <a href=\"#problem\">The Gap<\u002Fa>\n        <a href=\"#services\">How We Help<\u002Fa>\n        <a href=\"#method\">The Method<\u002Fa>\n        <a href=\"#revenue\">Revenue<\u002Fa>\n        <a href=\"#founder\">Founder<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h4>Connect<\u002Fh4>\n        <a href=\"#\" data-lead=\"\">Book a Strategy Call<\u002Fa>\n        <a href=\"mailto:hello@scale-haus.io\">hello@scale-haus.io<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>© 2026 ScaleHaus — Turning Audiences Into Businesses.<\u002Fspan>\n      <span>Built for creators, not algorithms.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<script src=\"997b241b-e7c0-4b72-a497-9a25f8682af0\"><\u002Fscript>\n<script>\n(function(){\n  /* ---- nav scroll state ---- */\n  var nav = document.getElementById('nav');\n  var onScroll = function(){\n    if(window.scrollY > 40){ nav.classList.add('scrolled'); }\n    else { nav.classList.remove('scrolled'); }\n  };\n  window.addEventListener('scroll', onScroll, {passive:true});\n  onScroll();\n\n  /* ---- hero entrance (rAF for smooth play, timeout as a visibility-proof fallback) ---- */\n  function heroIn(){\n    var hc = document.querySelector('.hero-copy');\n    var hm = document.querySelector('.hero-media');\n    if(hc) hc.classList.add('in');\n    if(hm) hm.classList.add('in');\n  }\n  requestAnimationFrame(function(){ requestAnimationFrame(heroIn); });\n  setTimeout(heroIn, 250);\n\n  /* ---- mobile menu ---- */\n  var burger = document.getElementById('burger');\n  var menu = document.getElementById('mobileMenu');\n  var toggle = function(){\n    var open = menu.classList.toggle('open');\n    burger.classList.toggle('open', open);\n    document.body.style.overflow = open ? 'hidden' : '';\n  };\n  burger.addEventListener('click', toggle);\n  menu.querySelectorAll('a').forEach(function(a){\n    a.addEventListener('click', function(){ if(menu.classList.contains('open')) toggle(); });\n  });\n\n  /* ---- scroll reveal ---- */\n  var io = new IntersectionObserver(function(entries){\n    entries.forEach(function(e){\n      if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }\n    });\n  }, {threshold:0.14, rootMargin:'0px 0px -8% 0px'});\n  document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });\n\n  /* ---- revenue interaction ---- */\n  var items = Array.prototype.slice.call(document.querySelectorAll('#revList .rev-item'));\n  var bar = document.getElementById('revBar');\n  var numEl = document.getElementById('revNum');\n  var streamsEl = document.getElementById('revStreams');\n  var footEl = document.getElementById('revFoot');\n  var total = items.length;\n\n  var states = [\n    {b:'<b>Fragile.<\u002Fb> One stream means one point of failure. Add streams to see resilience compound.'},\n    {b:'<b>Exposed.<\u002Fb> Two streams is better — but still a thin foundation for a real business.'},\n    {b:'<b>Stabilising.<\u002Fb> Three streams and the income starts to smooth out month to month.'},\n    {b:'<b>Resilient.<\u002Fb> Four streams — no single platform or partner can take you to zero.'},\n    {b:'<b>Diversified.<\u002Fb> Five streams working together. This is a business, not a side hustle.'},\n    {b:'<b>Compounding.<\u002Fb> Six streams feeding each other. Audience becomes an engine.'},\n    {b:'<b>Unbreakable.<\u002Fb> The full ScaleHaus stack — owned, diversified, built to scale.'}\n  ];\n\n  function render(){\n    var active = items.filter(function(it){ return it.classList.contains('on'); });\n    var n = active.length;\n    // bars\n    bar.innerHTML = '';\n    active.forEach(function(it){\n      var seg = document.createElement('i');\n      seg.style.width = (parseInt(it.getAttribute('data-w'),10) * 2.6) + '%';\n      bar.appendChild(seg);\n    });\n    numEl.textContent = n;\n    streamsEl.textContent = n + ' / ' + total + ' streams';\n    var idx = Math.max(0, Math.min(states.length-1, n-1));\n    footEl.innerHTML = n === 0\n      ? '<b>No income.<\u002Fb> Select your first stream to begin building the stack.'\n      : states[idx].b;\n  }\n\n  items.forEach(function(it){\n    it.addEventListener('click', function(){\n      it.classList.toggle('on');\n      render();\n    });\n  });\n  render();\n\n  /* ---- lead modal ---- */\n  // Leads are delivered to this inbox. Change this one line to your preferred email.\n  var LEAD_EMAIL = 'hello@scale-haus.io';\n\n  var modal = document.getElementById('leadModal');\n  var modalCard = modal.querySelector('.modal-card');\n  var form = document.getElementById('leadForm');\n  var successBox = document.getElementById('leadSuccess');\n  var errorBox = document.getElementById('leadError');\n  var submitBtn = document.getElementById('leadSubmit');\n  var lastFocused = null;\n\n  function openModal(e){\n    if(e) e.preventDefault();\n    lastFocused = document.activeElement;\n    // reset to form state each open\n    form.classList.remove('hide');\n    successBox.classList.remove('show');\n    errorBox.style.display = 'none';\n    modal.classList.add('open');\n    modal.setAttribute('aria-hidden','false');\n    document.body.style.overflow = 'hidden';\n    setTimeout(function(){ var f = document.getElementById('lf-name'); if(f) f.focus(); }, 350);\n  }\n  function closeModal(){\n    modal.classList.remove('open');\n    modal.setAttribute('aria-hidden','true');\n    document.body.style.overflow = '';\n    if(lastFocused && lastFocused.focus) lastFocused.focus();\n  }\n\n  // open from any [data-lead] trigger\n  document.querySelectorAll('[data-lead]').forEach(function(el){\n    el.addEventListener('click', openModal);\n  });\n  document.getElementById('leadClose').addEventListener('click', closeModal);\n  document.getElementById('successClose').addEventListener('click', closeModal);\n  modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });\n  document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });\n\n  form.addEventListener('submit', function(e){\n    e.preventDefault();\n    // basic validation\n    var name = form.name.value.trim();\n    var email = form.email.value.trim();\n    if(!name || !email || !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)){\n      errorBox.textContent = 'Please enter your name and a valid email.';\n      errorBox.style.display = 'block';\n      return;\n    }\n    if(form._honey.value){ return; } // spam honeypot\n    errorBox.style.display = 'none';\n    submitBtn.setAttribute('disabled','');\n    submitBtn.querySelector('span').textContent = 'Sending…';\n\n    var data = new FormData(form);\n    data.append('_captcha', 'false');\n    data.append('_template', 'table');\n\n    fetch('https://formsubmit.co/ajax/' + LEAD_EMAIL, {\n      method: 'POST',\n      headers: { 'Accept': 'application/json' },\n      body: data\n    }).then(function(r){ return r.json(); }).then(function(){\n      form.classList.add('hide');\n      successBox.classList.add('show');\n    }).catch(function(){\n      errorBox.textContent = 'Something went wrong. Please email us directly at ' + LEAD_EMAIL + '.';\n      errorBox.style.display = 'block';\n    }).finally(function(){\n      submitBtn.removeAttribute('disabled');\n      submitBtn.querySelector('span').textContent = 'Request My Call';\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
